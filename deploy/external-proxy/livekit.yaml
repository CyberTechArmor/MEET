# LiveKit config for the "external reverse proxy" install option.
#
# This file is bind-mounted read-only into the livekit container. WebRTC UDP
# media bypasses the reverse proxy and reaches LiveKit directly on the host
# UDP range below.
#
# If you change LIVEKIT_UDP_PORT_RANGE_START / _END in .env, also update
# port_range_start / port_range_end here AND the published UDP range in
# docker-compose.yml — these three places must agree.

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000

  # Auto-detect the public IP via STUN. Overridden by node_ip below when
  # LIVEKIT_NODE_IP is set in the environment, which is read by the LiveKit
  # entrypoint and exported as NODE_IP.
  use_external_ip: true

  # Don't advertise loopback ICE candidates — clients can't reach them.
  enable_loopback_candidate: false

  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302

# TURN config is driven entirely by env vars from .env (see compose file).
# Cellular carriers use symmetric NAT, which breaks WebRTC's STUN-based
# hole punching; clients on a phone hotspot only connect when LiveKit's
# embedded TURN is reachable on TURN_TLS_PORT (default 5349). Leaving
# this block out keeps the env defaults authoritative; LiveKit reads
# LIVEKIT_TURN_* without anything declared here.

# Fallback keys for direct `docker run` use only. The compose stack sets
# LIVEKIT_KEYS in the environment, which OVERRIDES this block at runtime
# (see deploy/external-proxy/docker-compose.yml). install.sh writes the
# matching <key>: <secret> there from a single source of truth, so this
# fallback shouldn't normally be reached.
keys:
  devkey: secret

logging:
  level: info
