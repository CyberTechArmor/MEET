# MEET — External Reverse Proxy install option.
#
# Use this when an external reverse proxy (host Caddy on a bare-metal or LXC
# host, host nginx, NPM, ProxyPilot, …) terminates TLS and forwards plaintext
# HTTP/WS to this stack. NO bundled Traefik/Caddy/nginx, NO ACME, NO certbot
# volumes. TLS is the external proxy's job.
#
# Every published port binds to ${BIND_HOST:-0.0.0.0} so the host proxy can
# reach the container's bridge IP. Do NOT change BIND_HOST to 127.0.0.1 in
# this layout — the proxy lives outside the container's loopback.
#
# Two URL layouts are supported, switched by .env:
#   - Single-domain (path-prefix): set PUBLIC_BASE_URL only.
#   - Three-domain (subdomain split): set PUBLIC_API_URL / PUBLIC_LIVEKIT_URL
#     to https://api.<root> / wss://livekit.<root>.
#
# Reference reverse-proxy snippets live in deploy/external-proxy/{caddy,nginx}.
# Full walk-through: docs/install/external-reverse-proxy.md.

services:
  # Frontend — React + Vite, served by nginx on port 80 inside the container.
  # VITE_API_URL and VITE_LIVEKIT_URL are baked in at build time. Leave them
  # empty for single-domain mode (the frontend's runtime detection in
  # frontend/src/lib/livekit.ts uses relative URLs when port is 80/443).
  meet-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${PUBLIC_API_URL:-}
        - VITE_LIVEKIT_URL=${PUBLIC_LIVEKIT_URL:-}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${MEET_FRONTEND_PORT:-3000}:80"
    depends_on:
      - meet-api
      - livekit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - meet-network

  # API — Express, /health and /api/* routes. CORS_ORIGIN is locked to the
  # public base URL so a misconfigured proxy fails loudly instead of silently
  # exposing the API to anyone.
  #
  # LIVEKIT_URL points at host.docker.internal because the livekit service
  # runs with network_mode: host (see below) and isn't reachable on the
  # bridge by service name. host-gateway resolves to the LXC's interface
  # where livekit is actually listening.
  meet-api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    ports:
      - "${BIND_HOST:-0.0.0.0}:${MEET_API_PORT:-8080}:8080"
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - LIVEKIT_URL=http://host.docker.internal:${MEET_LIVEKIT_WS_PORT:-7880}
      - PORT=8080
      - CORS_ORIGIN=${PUBLIC_BASE_URL:-*}
      - MEET_DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Persistent state for the API: SQLite at /data/meet.db. Survives
    # `docker compose down && up`. Removed by `docker compose down -v` —
    # warn operators before they run that.
    volumes:
      - meet-api-data:/data
    depends_on:
      - livekit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - meet-network

  # LiveKit — WebRTC backend. Runs with host networking so it owns the
  # LXC's network namespace directly: signaling 7880, TCP fallback 7881,
  # and the UDP media range all bind on the LXC's interfaces with zero
  # Docker port publishing.
  #
  # Why host networking: docker-proxy publishes one userland process per
  # port, and the UDP media range is 10,001 ports. Inside an LXC that
  # routinely takes minutes, exhausts file descriptors, or wedges
  # iptables-restore — the install would hang with "6/7 services up".
  # docker-proxy also rewrites UDP source ports, which breaks ICE.
  # network_mode: host fixes both.
  #
  # Ports/ranges are owned by livekit.yaml (rtc.tcp_port,
  # rtc.port_range_start/_end). If you change them there, also update the
  # MEET_LIVEKIT_*_PORT / LIVEKIT_UDP_PORT_RANGE_* variables in .env so
  # the host firewall and reverse-proxy snippets still match.
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    network_mode: host
    environment:
      - NODE_IP=${LIVEKIT_NODE_IP:-}
      # LIVEKIT_KEYS overrides the keys: block in livekit.yaml. install.sh
      # writes "<key>: <secret>" here from the same source of truth that
      # populates LIVEKIT_API_KEY / LIVEKIT_API_SECRET on meet-api, so the
      # two services can never drift. Don't set this by hand.
      - LIVEKIT_KEYS=${LIVEKIT_KEYS:-}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${MEET_LIVEKIT_WS_PORT:-7880}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  meet-network:
    driver: bridge

volumes:
  # SQLite + WAL files for meet-api. API keys, webhooks, server settings,
  # and admin credentials all live here. `docker compose down` keeps it;
  # `docker compose down -v` wipes it.
  meet-api-data:
