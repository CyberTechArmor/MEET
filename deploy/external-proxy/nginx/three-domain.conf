# MEET — three-domain nginx vhost for an EXTERNAL host nginx.
#
# Use this layout when path-prefix routing isn't possible. Each component
# gets its own subdomain. The host nginx owns TLS — obtain certs with
# certbot or your existing PKI; the MEET stack itself ships NO TLS.
#
# Wiring assumed:
#
#   meet.example.com         ──► <UPSTREAM_HOST>:3000   (frontend)
#   api.meet.example.com     ──► <UPSTREAM_HOST>:8080   (API)
#   livekit.meet.example.com ──► <UPSTREAM_HOST>:7880   (LiveKit signaling)
#
# UPSTREAM_HOST examples:
#   • Incus/LXC bridge:   10.x.y.z   (the container's bridge IP)
#   • Same host as MEET:  127.0.0.1
#   • Remote host:        the LAN IP of the box running MEET
# Edit the three upstream blocks below before deploying.
#
# DNS: A/AAAA records for all three names pointing at the host that runs
# nginx.

upstream meet_frontend { server 127.0.0.1:3000; }
upstream meet_api      { server 127.0.0.1:8080; }
upstream meet_livekit  { server 127.0.0.1:7880; }

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

# --- Frontend -------------------------------------------------------------
server {
	listen 80;
	listen [::]:80;
	server_name meet.example.com;
	location /.well-known/acme-challenge/ { root /var/www/html; }
	location / { return 301 https://$host$request_uri; }
}
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name meet.example.com;

	ssl_certificate     /etc/letsencrypt/live/meet.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/meet.example.com/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	add_header Strict-Transport-Security "max-age=63072000" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Content-Security-Policy "frame-ancestors *" always;

	location / {
		proxy_pass http://meet_frontend;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
	}
}

# --- API ------------------------------------------------------------------
server {
	listen 80;
	listen [::]:80;
	server_name api.meet.example.com;
	location /.well-known/acme-challenge/ { root /var/www/html; }
	location / { return 301 https://$host$request_uri; }
}
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name api.meet.example.com;

	ssl_certificate     /etc/letsencrypt/live/api.meet.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/api.meet.example.com/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	# Avatar / recording uploads — keep in sync with API limit.
	client_max_body_size 50m;

	location / {
		proxy_pass http://meet_api;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_read_timeout 86400;
		proxy_send_timeout 86400;
	}
}

# --- LiveKit signaling ----------------------------------------------------
server {
	listen 80;
	listen [::]:80;
	server_name livekit.meet.example.com;
	location /.well-known/acme-challenge/ { root /var/www/html; }
	location / { return 301 https://$host$request_uri; }
}
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name livekit.meet.example.com;

	ssl_certificate     /etc/letsencrypt/live/livekit.meet.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/livekit.meet.example.com/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	# Long timeouts and no buffering — signaling outlives default 60s.
	location / {
		proxy_pass http://meet_livekit;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_read_timeout 86400;
		proxy_send_timeout 86400;
		proxy_buffering off;
	}
}
