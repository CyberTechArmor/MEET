# MEET — single-domain nginx vhost for an EXTERNAL host nginx.
#
# Place under /etc/nginx/sites-available/meet (or /etc/nginx/conf.d/meet.conf
# on RHEL-family) and reload nginx. The host nginx owns TLS — obtain a cert
# with certbot or your existing PKI; the MEET stack itself ships NO TLS.
#
# Wiring assumed below:
#
#   browser ──► host nginx (TLS) ──► <UPSTREAM_HOST>:<port> ──► MEET
#
# UPSTREAM_HOST is the address the host nginx uses to reach the MEET
# container. Examples by topology:
#   • Incus/LXC bridge:   10.x.y.z   (the container's bridge IP)
#   • Same host as MEET:  127.0.0.1
#   • Remote host:        the LAN IP of the box running MEET
# Edit the three upstream blocks below before deploying.

upstream meet_frontend { server 127.0.0.1:3000; }
upstream meet_api      { server 127.0.0.1:8080; }
upstream meet_livekit  { server 127.0.0.1:7880; }

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 80;
	listen [::]:80;
	server_name meet.example.com;
	location /.well-known/acme-challenge/ { root /var/www/html; }
	location / { return 301 https://$host$request_uri; }
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name meet.example.com;

	# Replace with your cert paths.
	ssl_certificate     /etc/letsencrypt/live/meet.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/meet.example.com/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	# Avatar / recording uploads — keep this in sync with the API limit.
	client_max_body_size 50m;

	add_header Strict-Transport-Security "max-age=63072000" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Content-Security-Policy "frame-ancestors *" always;

	gzip on;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
	gzip_min_length 1000;

	# LiveKit signaling. Strip /livekit so LiveKit sees a normal /rtc URL.
	# Long timeouts: signaling sessions outlive the 60s nginx default.
	location /livekit/ {
		rewrite ^/livekit/(.*) /$1 break;
		proxy_pass http://meet_livekit;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_read_timeout 86400;
		proxy_send_timeout 86400;
		proxy_buffering off;
	}

	location /api/ {
		proxy_pass http://meet_api;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
	}

	location /ws/ {
		proxy_pass http://meet_api;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 86400;
		proxy_send_timeout 86400;
	}

	location / {
		proxy_pass http://meet_frontend;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
	}
}
